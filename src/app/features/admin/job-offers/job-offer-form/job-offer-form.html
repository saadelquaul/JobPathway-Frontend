
    <div class="page animate-fade-in">
      <button class="back-btn" (click)="router.navigate(['/admin/job-offers'])">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back
      </button>

      <div class="form-card card" style="display: flex; flex-direction: column; justify-self:center;">
        <h1>{{ isEdit() ? 'Edit' : 'Create' }} Job Offer</h1>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label class="label">Title *</label>
            <input class="input-field" formControlName="title" placeholder="e.g. Senior Backend Developer" />
            @if (form.controls.title.touched && form.controls.title.errors) {
              <span class="error-text">Title is required</span>
            }
          </div>

          <div class="form-group">
            <label class="label">Description</label>
            <textarea class="input-field textarea" formControlName="description" rows="5" placeholder="Describe the role, responsibilities, and what you're looking for..."></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="label">Job Type *</label>
              <select class="input-field" formControlName="type">
                @for (type of jobTypes; track type) {
                  <option [value]="type">{{ formatEnum(type) }}</option>
                }
              </select>
            </div>
            <div class="form-group">
              <label class="label">Work Model *</label>
              <select class="input-field" formControlName="workModel">
                @for (model of workModels; track model) {
                  <option [value]="model">{{ formatEnum(model) }}</option>
                }
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="label">Salary Range</label>
              <input class="input-field" formControlName="salaryRange" placeholder="e.g. $80k - $120k" />
            </div>
            <div class="form-group">
              <label class="label">Location</label>
              <input class="input-field" formControlName="location" placeholder="e.g. New York, NY" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="label">Required Education</label>
              <input class="input-field" formControlName="requiredEducation" placeholder="e.g. Bachelor's in CS" />
            </div>
            <div class="form-group">
              <label class="label">Required Experience</label>
              <input class="input-field" formControlName="requiredExperience" placeholder="e.g. 3+ years" />
            </div>
          </div>

          <div class="skills-section" formArrayName="requiredSkills">
            <div class="skills-header">
              <label class="label">Required Skills</label>
              <button type="button" class="btn-secondary btn-sm" (click)="addSkill()">+ Add Skill</button>
            </div>
             @for (skill of skillsArray.controls; track $index) {
              <div class="skill-row" [formGroupName]="$index">
                <input class="input-field" formControlName="name" placeholder="Skill name" />
                <select class="input-field" formControlName="minimumLevel">
                  @for (level of skillLevels; track level) {
                    <option [value]="level">{{ formatEnum(level) }}</option>
                  }
                </select>
                <button type="button" class="icon-btn danger" (click)="removeSkill($index)">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
            }
          </div>

          <div class="form-actions">
            <button type="button" class="btn-secondary" (click)="router.navigate(['/admin/job-offers'])">Cancel</button>
            <button type="submit" class="btn-primary" [disabled]="saving()">
              @if (saving()) {
                <span class="spinner-sm"></span>
              }
              {{ isEdit() ? 'Update' : 'Create' }} Job Offer
            </button>
          </div>
        </form>
      </div>
    </div>
